<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      background: #f1f5f9;
    }

    .sidebar {
      width: 240px;
      height: 100vh;
      background: #0f172a;
      color: white;
      position: fixed;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      font-size: 20px;
    }

    .sidebar button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      background: none;
      color: #cbd5f5;
      text-align: left;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.3s;
    }

    .sidebar button:hover {
      background: #1e293b;
      color: white;
    }

    .main {
      margin-left: 240px;
      width: 100%;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button.primary {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      margin-top: 10px;
    }

    li {
      padding: 10px;
      background: #f8fafc;
      margin-bottom: 8px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
    }

    .actions button {
      margin-left: 5px;
      padding: 5px 8px;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    .edit {
      background: #f59e0b;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }

  </style>
</head>
<body>

  <div class="sidebar">
    <h2>⚙️ Admin</h2>
    <button onclick="showSection('dashboard')">Dashboard</button>
    <button onclick="showSection('cadastro')">Cadastrar</button>
    <button onclick="showSection('lista')">Gerenciar Dados</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="user-box">
        <span id="user-info"></span>
      </div>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>

    <div id="dashboard" class="card">
      <h2>Dashboard</h2>
      <p>Gerencie os dados do sistema de dimensionamento.</p>
    </div>

    <div id="cadastro" class="card hidden">
      <h2>Novo Cadastro</h2>
      <input type="text" id="nome" placeholder="Nome">
      <input type="number" id="valor" placeholder="Valor">
      <button class="primary" onclick="salvar()">Salvar</button>
    </div>

    <div id="lista" class="card hidden">
      <h2>Gerenciar Dados</h2>
      <ul id="lista-dados"></ul>
    </div>

  </div>

  <script>
    netlifyIdentity.init();

    const adminEmails = ["seuemail@gmail.com"];

    netlifyIdentity.on("init", user => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        const nome = user.user_metadata?.full_name || user.email;
        document.getElementById("user-info").innerText = "Olá, " + nome;

        if (!adminEmails.includes(user.email)) {
          alert("Acesso restrito ao administrador");
          window.location.href = "index.html";
        }
      }
    });

    function logout() {
      netlifyIdentity.logout();
    }

    netlifyIdentity.on("logout", () => {
      window.location.href = "login.html";
    });

    function showSection(section) {
      document.querySelectorAll('.card').forEach(el => el.classList.add('hidden'));
      document.getElementById(section).classList.remove('hidden');
    }

    function salvar() {
      const nome = document.getElementById("nome").value;
      const valor = document.getElementById("valor").value;

      if (!nome || !valor) {
        alert("Preencha todos os campos");
        return;
      }

      const dados = JSON.parse(localStorage.getItem("dados") || "[]");
      dados.push({ nome, valor });
      localStorage.setItem("dados", JSON.stringify(dados));

      document.getElementById("nome").value = "";
      document.getElementById("valor").value = "";

      listar();
    }

    function listar() {
      const lista = document.getElementById("lista-dados");
      lista.innerHTML = "";

      const dados = JSON.parse(localStorage.getItem("dados") || "[]");

      dados.forEach((item, index) => {
        const li = document.createElement("li");
        li.innerHTML = `
          ${item.nome} - ${item.valor}
          <div class="actions">
            <button class="edit" onclick="editar(${index})">Editar</button>
            <button class="delete" onclick="remover(${index})">Excluir</button>
          </div>
        `;
        lista.appendChild(li);
      });
    }

    function editar(index) {
      const dados = JSON.parse(localStorage.getItem("dados"));
      const item = dados[index];

      document.getElementById("nome").value = item.nome;
      document.getElementById("valor").value = item.valor;

      remover(index);
      showSection('cadastro');
    }

    function remover(index) {
      const dados = JSON.parse(localStorage.getItem("dados"));
      dados.splice(index, 1);
      localStorage.setItem("dados", JSON.stringify(dados));
      listar();
    }

    listar();
  </script>

</body>
</html>
