<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- 🔥 IMPORTANTE (Netlify Identity) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <h2>Login</h2>

  <button onclick="netlifyIdentity.open()">
    Entrar / Cadastrar
  </button>

  <script>
    netlifyIdentity.on("login", user => {
      window.location.href = "index.html"; // vai pro sistema
    });
  </script>

</body>
</html>
